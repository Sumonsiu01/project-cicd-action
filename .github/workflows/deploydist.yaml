
name: Deploy dist

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3  # Auto clones the repo

      - name: Debug repo structure
        run: |
          echo "Listing repo files:"
          ls -R    # দেখে নাও CiCd folder আছে কি না

      - name: Build React App
        run: |
          cd CiCd        # Subfolder-এ ঢুকলেই package.json access হবে
          npm install
          npm run build

      - name: Success message
        run: echo "✅ React app build completed!"