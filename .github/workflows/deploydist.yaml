name: Deploy dist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug repo structure
        run: |
          echo "Listing repo files:"
          ls -R

      - name: Build React App
        run: |
          cd CiCd
          npm install
          npm run build

      - name: Success message
        run: echo "✅ React app build completed!"

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Debug repo structure
        run: |
          echo "Listing repo files:"
          ls -R

      - name: Build React App
        run: |
          cd CiCd
          npm install
          npm run build

      - name: Deploy
        run: echo "🚀 Deploy Successful"